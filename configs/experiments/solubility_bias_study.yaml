experiment_name: solubility_split_and_bias
property: solubility
data_source: benchmark          # fixed test set — all runs comparable to leaderboard
wandb_project: molgate-bias-study
wandb_group: solubility_split_comparison

seeds: [42, 123, 456]

# Axis 1: train/val partition strategy (test set is always the fixed benchmark set)
split_variants:
  - random
  - scaffold

# Axis 2: training set bias configurations
# null = no bias (baseline — scaffold + no bias = leaderboard submission)
bias_variants:
  - null
  - type: property_quantile
    low_quantile: 0.0
    high_quantile: 0.33         # train on insoluble compounds only
  - type: property_quantile
    low_quantile: 0.67
    high_quantile: 1.0          # train on highly soluble compounds only
  - type: mw_range
    max_mw: 300.0               # fragment-like training set
  - type: mw_range
    min_mw: 500.0               # lead-like / larger molecules only
  - type: cluster
    cluster_ids: [0]            # train on the single largest chemical cluster
    butina_cutoff: 0.4
  - type: cluster
    cluster_ids: [0, 1, 2]      # train on the 3 largest clusters
    butina_cutoff: 0.4
  - type: cluster
    cluster_ids: [0]
    butina_cutoff: 0.4
    invert: true                # train on everything EXCEPT the largest cluster

# Full grid: 2 splits × 8 bias variants × 3 seeds = 48 runs
# Note: scaffold + null = leaderboard baseline (3 seeds)

model:
  hidden_dim: 128
  num_layers: 3
  dropout: 0.1

training:
  epochs: 100
  lr: 0.001
  batch_size: 64
  patience: 15

results_dir: results/runs
